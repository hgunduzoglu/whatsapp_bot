<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Çok Yakında</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #0c2912 0%, #14532d 55%, #1c6b3a 100%);
      color: #f0fdf4;
      text-align: center;
      padding: 2rem;
    }
    .wrap { max-width: 560px; }
    .leaf { font-size: 3.5rem; margin-bottom: 1rem; }
    h1 { font-size: 2rem; letter-spacing: 0.02em; margin-bottom: 1.5rem; }
    .soon {
      display: inline-block;
      padding: 0.6rem 1.4rem;
      border: 1px solid rgba(187, 247, 208, 0.4);
      border-radius: 999px;
      font-size: 0.95rem;
      color: #dcfce7;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="leaf">🌱</div>
    <h1>Çok Yakında</h1>
    <span class="soon">Web sitemiz hazırlanıyor</span>
  </div>
</body>
</html>
